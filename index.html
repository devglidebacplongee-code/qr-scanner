<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner QR Code</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        
        #scanner-container {
            width: 100%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            color: #fff;
        }
        
        /* Sélection de caméra */
        #camera-selection {
            margin-bottom: 16px;
        }
        
        #camera-selection label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #9ca3af;
        }
        
        #camera-select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #374151;
            background: #1f2937;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        
        #camera-select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            min-height: 300px;
        }
        
        #result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            display: none;
            animation: slideIn 0.3s ease-out;
        }
        
        #result.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
            display: block;
        }
        
        #result.processing {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
            display: block;
        }
        
        #result.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
            display: block;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .instruction {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            margin-top: 16px;
        }
        
        /* Boutons */
        #controls {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .btn-start {
            background: #10b981;
            color: white;
        }
        
        .btn-start:hover {
            background: #059669;
        }
        
        .btn-start:active {
            transform: scale(0.98);
        }
        
        .btn-stop {
            background: #ef4444;
            color: white;
        }
        
        .btn-stop:hover {
            background: #dc2626;
        }
        
        .btn-stop:active {
            transform: scale(0.98);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Masquer les boutons originaux */
        #reader__dashboard_section_csr button {
            display: none !important;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            #scanner-container {
                padding: 16px;
            }
            
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="scanner-container">
        <h1>📱 Scanner QR Code</h1>
        
        <!-- Sélection de caméra -->
        <div id="camera-selection">
            <label for="camera-select">Sélectionner une caméra :</label>
            <select id="camera-select">
                <option value="">Chargement des caméras...</option>
            </select>
        </div>
        
        <div id="reader"></div>
        
        <div id="controls">
            <button id="btn-start" class="btn btn-start" disabled>▶️ Démarrer le scan</button>
            <button id="btn-stop" class="btn btn-stop" disabled>⏹️ Arrêter le scan</button>
        </div>
        
        <div id="result"></div>
        
        <p class="instruction">
            Positionnez le QR code devant la caméra
        </p>
    </div>
    
    <script>
        let isProcessing = false;
        let scanner = null;
        let lastScannedCode = '';
        let isScanning = false;
        let availableCameras = [];
        
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const cameraSelect = document.getElementById('camera-select');
        
        // ==========================================
        // CHARGER LES CAMÉRAS DISPONIBLES
        // ==========================================
        async function loadCameras() {
            try {
                const cameras = await Html5Qrcode.getCameras();
                availableCameras = cameras;
                
                console.log('📷 Caméras trouvées:', cameras.length);
                cameras.forEach((camera, index) => {
                    console.log(`  ${index}: ${camera.label || camera.id}`);
                });
                
                // Remplir le select
                cameraSelect.innerHTML = '';
                
                if (cameras.length === 0) {
                    cameraSelect.innerHTML = '<option value="">Aucune caméra trouvée</option>';
                    showResult('❌ Aucune caméra disponible', 'error');
                    return;
                }
                
                cameras.forEach((camera, index) => {
                    const option = document.createElement('option');
                    option.value = camera.id;
                    
                    // Nom convivial de la caméra
                    let cameraName = camera.label || `Caméra ${index + 1}`;
                    
                    // Filtrer OBS Virtual Camera par défaut
                    if (cameraName.toLowerCase().includes('obs') || 
                        cameraName.toLowerCase().includes('virtual')) {
                        cameraName += ' (virtuelle - non recommandée)';
                    }
                    
                    option.textContent = cameraName;
                    
                    // Sélectionner par défaut la première caméra physique
                    if (index === 0 || 
                        (!option.textContent.includes('virtuelle') && !cameraSelect.value)) {
                        option.selected = true;
                    }
                    
                    cameraSelect.appendChild(option);
                });
                
                // Activer le bouton démarrer
                btnStart.disabled = false;
                showResult('✅ Caméra prête', 'success');
                
            } catch (err) {
                console.error('❌ Erreur chargement caméras:', err);
                cameraSelect.innerHTML = '<option value="">Erreur de chargement</option>';
                showResult('❌ Erreur: ' + err.message, 'error');
            }
        }
        
        // ==========================================
        // AFFICHER RÉSULTAT
        // ==========================================
        function showResult(message, type) {
            const resultEl = document.getElementById('result');
            resultEl.textContent = message;
            resultEl.className = type;
            
            if (type !== 'processing') {
                setTimeout(() => {
                    resultEl.style.display = 'none';
                }, 3000);
            }
        }
        
        // ==========================================
        // CALLBACK SCAN RÉUSSI
        // ==========================================
        function onScanSuccess(decodedText, decodedResult) {
            if (isProcessing || decodedText === lastScannedCode) {
                return;
            }
            
            isProcessing = true;
            lastScannedCode = decodedText;
            
            console.log('✅ QR scanné:', decodedText);
            
            showResult('⏳ Code détecté : ' + decodedText, 'processing');
            
            // Sauvegarder dans localStorage
            try {
                localStorage.setItem('scannedQR', decodedText);
                localStorage.setItem('qrTimestamp', Date.now().toString());
                console.log('💾 Sauvegardé dans localStorage');
            } catch (e) {
                console.warn('⚠️ localStorage non disponible');
            }
            
            // Pause du scanner
            if (scanner) {
                try {
                    scanner.pause(true);
                } catch (e) {
                    console.warn('⚠️ Impossible de mettre en pause');
                }
            }
            
            // Afficher succès
            setTimeout(() => {
                showResult('✅ Code envoyé : ' + decodedText, 'success');
            }, 500);
            
            // Reprendre après 2 secondes
            setTimeout(() => {
                isProcessing = false;
                lastScannedCode = '';
                
                if (scanner && isScanning) {
                    try {
                        scanner.resume();
                    } catch (e) {
                        console.warn('⚠️ Impossible de reprendre');
                    }
                }
                
                setTimeout(() => {
                    document.getElementById('result').style.display = 'none';
                }, 1000);
                
            }, 2000);
        }
        
        // ==========================================
        // CALLBACK SCAN ÉCHOUÉ
        // ==========================================
        function onScanFailure(error) {
            // Ne rien afficher - erreurs normales
        }
        
        // ==========================================
        // DÉMARRER LE SCANNER
        // ==========================================
        async function startScanner() {
            const selectedCameraId = cameraSelect.value;
            
            if (!selectedCameraId) {
                showResult('❌ Veuillez sélectionner une caméra', 'error');
                return;
            }
            
            try {
                showResult('🔄 Démarrage du scanner...', 'processing');
                
                // Créer l'instance si nécessaire
                if (!scanner) {
                    scanner = new Html5QrcodeScanner(
                        "reader",
                        { 
                            fps: 10,
                            qrbox: { width: 250, height: 250 },
                            rememberLastUsedCamera: false,
                            showTorchButtonIfSupported: true
                        },
                        false
                    );
                }
                
                // Démarrer avec la caméra sélectionnée
                scanner.render(onScanSuccess, onScanFailure);
                
                isScanning = true;
                btnStart.disabled = true;
                btnStop.disabled = false;
                cameraSelect.disabled = true;
                
                showResult('✅ Scanner actif', 'success');
                console.log('✅ Scanner démarré');
                
            } catch (err) {
                console.error('❌ Erreur démarrage:', err);
                
                let errorMsg = 'Erreur: ';
                
                if (err.name === 'NotAllowedError') {
                    errorMsg += 'Permission caméra refusée';
                } else if (err.name === 'NotReadableError') {
                    errorMsg += 'Caméra occupée ou inaccessible. Essayez une autre caméra.';
                } else if (err.name === 'NotFoundError') {
                    errorMsg += 'Caméra introuvable';
                } else if (err.message) {
                    errorMsg += err.message;
                } else {
                    errorMsg += 'Erreur inconnue';
                }
                
                showResult('❌ ' + errorMsg, 'error');
                
                // Réactiver les contrôles
                btnStart.disabled = false;
                cameraSelect.disabled = false;
            }
        }
        
        // ==========================================
        // ARRÊTER LE SCANNER
        // ==========================================
        async function stopScanner() {
            try {
                if (scanner) {
                    await scanner.clear();
                    scanner = null;
                }
                
                isScanning = false;
                btnStart.disabled = false;
                btnStop.disabled = true;
                cameraSelect.disabled = false;
                
                showResult('⏹️ Scanner arrêté', 'success');
                console.log('⏹️ Scanner arrêté');
                
            } catch (err) {
                console.error('❌ Erreur arrêt:', err);
                showResult('❌ Erreur lors de l\'arrêt', 'error');
            }
        }
        
        // ==========================================
        // ÉVÉNEMENTS
        // ==========================================
        btnStart.addEventListener('click', startScanner);
        btnStop.addEventListener('click', stopScanner);
        
        // Changement de caméra pendant le scan
        cameraSelect.addEventListener('change', async () => {
            if (isScanning) {
                await stopScanner();
                showResult('ℹ️ Changement de caméra. Redémarrez le scan.', 'success');
            }
        });
        
        // ==========================================
        // API PUBLIQUE
        // ==========================================
        window.getLastScannedCode = function() {
            try {
                return localStorage.getItem('scannedQR');
            } catch (e) {
                return null;
            }
        };
        
        window.clearLastCode = function() {
            try {
                localStorage.removeItem('scannedQR');
                localStorage.removeItem('qrTimestamp');
            } catch (e) {
                console.warn('⚠️ Impossible d\'effacer');
            }
        };
        
        window.getCameras = function() {
            return availableCameras;
        };
        
        // ==========================================
        // INITIALISATION
        // ==========================================
        window.addEventListener('load', () => {
            console.log('📄 Page chargée');
            
            // Vérifier que la lib est chargée
            if (typeof Html5QrcodeScanner === 'undefined') {
                showResult('❌ Bibliothèque non chargée', 'error');
                return;
            }
            
            console.log('✅ Bibliothèque Html5Qrcode chargée');
            
            // Charger les caméras
            loadCameras();
        });
        
        console.log('🎬 Script QR Scanner initialisé');
    </script>
</body>
</html>
