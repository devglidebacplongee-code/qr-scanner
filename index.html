<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner QR</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }
        
        #scanner-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }
        
        #reader {
            flex: 1;
            border-radius: 8px;
            overflow: hidden;
        }
        
        #reader__dashboard_section_csr button {
            display: none !important;
        }
        
        #controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-start {
            background: #10b981;
            color: white;
        }
        
        .btn-stop {
            background: #ef4444;
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        #result-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 24px 32px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            z-index: 9999;
            display: none;
            animation: popup 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        #result-overlay.show {
            display: block;
        }
        
        @keyframes popup {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        #result-overlay .icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 12px;
        }
        
        #result-overlay .code {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div id="scanner-container">
        <div id="reader"></div>
        <div id="controls">
            <button id="btn-start" class="btn btn-start">▶️ Démarrer</button>
            <button id="btn-stop" class="btn btn-stop" disabled>⏹️ Arrêter</button>
        </div>
    </div>
    
    <div id="result-overlay">
        <div class="icon">✅</div>
        <div class="code" id="result-code"></div>
    </div>
    
    <script>
        let scanner = null;
        let isScanning = false;
        let lastCode = '';
        
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const resultOverlay = document.getElementById('result-overlay');
        const resultCode = document.getElementById('result-code');
        
        // ==========================================
        // CALLBACK QUAND QR CODE EST SCANNÉ
        // ==========================================
        function onScanSuccess(decodedText) {
            if (decodedText === lastCode) return;
            
            lastCode = decodedText;
            console.log('QR scanné:', decodedText);
            
            // Afficher le code
            resultCode.textContent = decodedText;
            resultOverlay.classList.add('show');
            
            // Sauvegarder dans localStorage (IMPORTANT pour Flutter)
            localStorage.setItem('scannedQR', decodedText);
            localStorage.setItem('qrTimestamp', Date.now().toString());
            
            // Envoyer via postMessage (pour Flutter WebView)
            if (window.parent) {
                window.parent.postMessage(
                    JSON.stringify({
                        type: 'QR_SCANNED',
                        code: decodedText,
                        timestamp: Date.now()
                    }),
                    '*'
                );
            }
            
            // Pause temporaire
            if (scanner && isScanning) {
                scanner.pause(true);
                
                setTimeout(() => {
                    resultOverlay.classList.remove('show');
                    lastCode = '';
                    if (scanner && isScanning) {
                        scanner.resume();
                    }
                }, 1500);
            }
        }
        
        // ==========================================
        // DÉMARRER LE SCAN
        // ==========================================
        async function startScan() {
            try {
                if (!scanner) {
                    scanner = new Html5Qrcode("reader");
                }
                
                const devices = await Html5Qrcode.getCameras();
                if (!devices || devices.length === 0) {
                    alert('Aucune caméra trouvée');
                    return;
                }
                
                const cameraId = devices.length > 1 ? devices[1].id : devices[0].id;
                
                await scanner.start(
                    cameraId,
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 250 }
                    },
                    onScanSuccess,
                    () => {}
                );
                
                isScanning = true;
                btnStart.disabled = true;
                btnStop.disabled = false;
                
            } catch (err) {
                alert('Erreur: ' + err.message);
                console.error(err);
            }
        }
        
        // ==========================================
        // ARRÊTER LE SCAN
        // ==========================================
        async function stopScan() {
            if (scanner && isScanning) {
                await scanner.stop();
                isScanning = false;
                btnStart.disabled = false;
                btnStop.disabled = true;
                lastCode = '';
            }
        }
        
        // ==========================================
        // ÉVÉNEMENTS
        // ==========================================
        btnStart.addEventListener('click', startScan);
        btnStop.addEventListener('click', stopScan);
        
        // Auto-démarrage si demandé
        window.addEventListener('message', (event) => {
            try {
                const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                if (data.action === 'START_SCAN') {
                    startScan();
                } else if (data.action === 'STOP_SCAN') {
                    stopScan();
                }
            } catch (e) {}
        });
        
        // API publique
        window.getLastScannedCode = () => localStorage.getItem('scannedQR');
        window.clearLastCode = () => {
            localStorage.removeItem('scannedQR');
            localStorage.removeItem('qrTimestamp');
        };
    </script>
</body>
</html>
