<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner QR Code</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        
        #scanner-container {
            width: 100%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            color: #fff;
        }
        
        #camera-selection {
            margin-bottom: 16px;
        }
        
        #camera-selection label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #9ca3af;
        }
        
        #camera-select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #374151;
            background: #1f2937;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        
        #camera-select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            min-height: 300px;
        }
        
        #result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            display: none;
            animation: slideIn 0.3s ease-out;
        }
        
        #result.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
            display: block;
        }
        
        #result.processing {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
            display: block;
        }
        
        #result.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
            display: block;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        #controls {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .btn-start {
            background: #10b981;
            color: white;
        }
        
        .btn-start:hover:not(:disabled) {
            background: #059669;
        }
        
        .btn-stop {
            background: #ef4444;
            color: white;
        }
        
        .btn-stop:hover:not(:disabled) {
            background: #dc2626;
        }
        
        .btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #reader__dashboard_section_csr button {
            display: none !important;
        }
        
        .instruction {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div id="scanner-container">
        <h1>📱 Scanner QR Code</h1>
        
        <div id="camera-selection">
            <label for="camera-select">📷 Sélectionner une caméra :</label>
            <select id="camera-select">
                <option value="">Chargement des caméras...</option>
            </select>
        </div>
        
        <div id="reader"></div>
        
        <div id="controls">
            <button id="btn-start" class="btn btn-start" disabled>▶️ Démarrer le scan</button>
            <button id="btn-stop" class="btn btn-stop" disabled>⏹️ Arrêter le scan</button>
        </div>
        
        <div id="result"></div>
        
        <p class="instruction">
            Positionnez le QR code devant la caméra
        </p>
    </div>
    
    <script>
        let isProcessing = false;
        let scanner = null;
        let lastScannedCode = '';
        let isScanning = false;
        let availableCameras = [];
        
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const cameraSelect = document.getElementById('camera-select');
        
        function showResult(message, type) {
            const resultEl = document.getElementById('result');
            resultEl.textContent = message;
            resultEl.className = type;
            
            if (type !== 'processing') {
                setTimeout(() => {
                    resultEl.style.display = 'none';
                }, 3000);
            }
        }
        
        async function loadCameras() {
            try {
                const cameras = await Html5Qrcode.getCameras();
                availableCameras = cameras;
                
                console.log('📷 Caméras trouvées:', cameras.length);
                cameras.forEach((camera, index) => {
                    console.log(`  Caméra ${index}:`, camera.label || camera.id);
                });
                
                cameraSelect.innerHTML = '';
                
                if (cameras.length === 0) {
                    cameraSelect.innerHTML = '<option value="">Aucune caméra trouvée</option>';
                    showResult('❌ Aucune caméra disponible', 'error');
                    return;
                }
                
                cameras.forEach((camera, index) => {
                    const option = document.createElement('option');
                    option.value = camera.id;
                    
                    let cameraName = camera.label || `Caméra ${index + 1}`;
                    
                    const lowerName = cameraName.toLowerCase();
                    if (lowerName.includes('obs') || 
                        lowerName.includes('virtual') || 
                        lowerName.includes('droidcam')) {
                        cameraName += ' ⚠️ (virtuelle)';
                        option.style.color = '#fbbf24';
                    }
                    
                    option.textContent = cameraName;
                    cameraSelect.appendChild(option);
                });
                
                // Sélectionner la première caméra non-virtuelle
                for (let i = 0; i < cameraSelect.options.length; i++) {
                    if (!cameraSelect.options[i].textContent.includes('virtuelle')) {
                        cameraSelect.selectedIndex = i;
                        break;
                    }
                }
                
                btnStart.disabled = false;
                showResult('✅ ' + cameras.length + ' caméra(s) détectée(s)', 'success');
                
            } catch (err) {
                console.error('❌ Erreur chargement caméras:', err);
                cameraSelect.innerHTML = '<option value="">Erreur de chargement</option>';
                
                const errorMsg = err && err.message ? err.message : 'Erreur inconnue';
                showResult('❌ ' + errorMsg, 'error');
            }
        }
        
        function onScanSuccess(decodedText, decodedResult) {
            if (isProcessing || decodedText === lastScannedCode) {
                return;
            }
            
            isProcessing = true;
            lastScannedCode = decodedText;
            
            console.log('✅ QR scanné:', decodedText);
            
            showResult('⏳ Code détecté : ' + decodedText, 'processing');
            
            try {
                localStorage.setItem('scannedQR', decodedText);
                localStorage.setItem('qrTimestamp', Date.now().toString());
                console.log('💾 Sauvegardé dans localStorage');
            } catch (e) {
                console.warn('⚠️ localStorage non disponible');
            }
            
            if (scanner) {
                try {
                    scanner.pause(true);
                } catch (e) {
                    console.warn('⚠️ Impossible de mettre en pause');
                }
            }
            
            setTimeout(() => {
                showResult('✅ Code : ' + decodedText, 'success');
            }, 500);
            
            setTimeout(() => {
                isProcessing = false;
                lastScannedCode = '';
                
                if (scanner && isScanning) {
                    try {
                        scanner.resume();
                    } catch (e) {
                        console.warn('⚠️ Impossible de reprendre');
                    }
                }
                
                setTimeout(() => {
                    document.getElementById('result').style.display = 'none';
                }, 1000);
                
            }, 2000);
        }
        
        function onScanFailure(error) {
            // Rien - erreurs normales
        }
        
        async function startScanner() {
            const selectedCameraId = cameraSelect.value;
            
            if (!selectedCameraId) {
                showResult('❌ Sélectionnez une caméra', 'error');
                return;
            }
            
            try {
                showResult('🔄 Démarrage...', 'processing');
                
                if (!scanner) {
                    scanner = new Html5QrcodeScanner(
                        "reader",
                        { 
                            fps: 10,
                            qrbox: { width: 250, height: 250 },
                            rememberLastUsedCamera: false,
                            showTorchButtonIfSupported: true
                        },
                        false
                    );
                }
                
                scanner.render(onScanSuccess, onScanFailure);
                
                isScanning = true;
                btnStart.disabled = true;
                btnStop.disabled = false;
                cameraSelect.disabled = true;
                
                showResult('✅ Scanner actif', 'success');
                console.log('✅ Scanner démarré');
                
            } catch (err) {
                console.error('❌ Erreur démarrage:', err);
                
                let errorMsg = 'Erreur: ';
                
                // Vérifier err.name de manière sûre
                const errorName = err && err.name ? err.name : '';
                const errorMessage = err && err.message ? err.message : '';
                
                if (errorName === 'NotAllowedError') {
                    errorMsg += 'Permission caméra refusée';
                } else if (errorName === 'NotReadableError') {
                    errorMsg += 'Caméra occupée ou inaccessible. Fermez les autres apps (Teams, Zoom, OBS...) et réessayez avec une autre caméra.';
                } else if (errorName === 'NotFoundError') {
                    errorMsg += 'Caméra introuvable';
                } else if (errorMessage) {
                    errorMsg += errorMessage;
                } else {
                    errorMsg += 'Impossible de démarrer la caméra';
                }
                
                showResult('❌ ' + errorMsg, 'error');
                
                btnStart.disabled = false;
                cameraSelect.disabled = false;
            }
        }
        
        async function stopScanner() {
            try {
                if (scanner) {
                    await scanner.clear();
                    scanner = null;
                }
                
                isScanning = false;
                btnStart.disabled = false;
                btnStop.disabled = true;
                cameraSelect.disabled = false;
                
                showResult('⏹️ Scanner arrêté', 'success');
                console.log('⏹️ Scanner arrêté');
                
            } catch (err) {
                console.error('❌ Erreur arrêt:', err);
                showResult('❌ Erreur lors de l\'arrêt', 'error');
            }
        }
        
        btnStart.addEventListener('click', startScanner);
        btnStop.addEventListener('click', stopScanner);
        
        cameraSelect.addEventListener('change', async () => {
            if (isScanning) {
                await stopScanner();
                showResult('ℹ️ Redémarrez le scan avec la nouvelle caméra', 'success');
            }
        });
        
        window.getLastScannedCode = function() {
            try {
                return localStorage.getItem('scannedQR');
            } catch (e) {
                return null;
            }
        };
        
        window.clearLastCode = function() {
            try {
                localStorage.removeItem('scannedQR');
                localStorage.removeItem('qrTimestamp');
            } catch (e) {
                console.warn('⚠️ Impossible d\'effacer');
            }
        };
        
        window.getCameras = function() {
            return availableCameras;
        };
        
        window.addEventListener('load', () => {
            console.log('📄 Page chargée');
            
            if (typeof Html5QrcodeScanner === 'undefined') {
                showResult('❌ Bibliothèque non chargée', 'error');
                return;
            }
            
            console.log('✅ Bibliothèque Html5Qrcode chargée');
            loadCameras();
        });
        
        console.log('🎬 Script QR Scanner initialisé');
    </script>
</body>
</html>
