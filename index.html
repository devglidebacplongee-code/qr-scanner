<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner QR</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }
        
        #scanner-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }
        
        #reader {
            flex: 1;
            border-radius: 8px;
            overflow: hidden;
            background: #1a1a1a;
        }
        
        /* Masquer les boutons par défaut de la lib */
        #reader__dashboard_section_csr button {
            display: none !important;
        }
        
        #controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
            font-family: inherit;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-start {
            background: #10b981;
            color: white;
        }
        
        .btn-stop {
            background: #ef4444;
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        #result-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 24px 32px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            z-index: 9999;
            display: none;
            animation: popup 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            min-width: 200px;
        }
        
        #result-overlay.show {
            display: block;
        }
        
        @keyframes popup {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        #result-overlay .icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 12px;
        }
        
        #result-overlay .code {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            word-break: break-all;
        }
        
        #status {
            text-align: center;
            margin-top: 8px;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
        }
        
        #status.ready {
            color: #60a5fa;
        }
        
        #status.active {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }
        
        #status.error {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        
        #status.processing {
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
        }
        
        .loading-dots {
            display: inline-block;
        }
        
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div id="scanner-container">
        <div id="reader"></div>
        
        <div id="controls">
            <button id="btn-start" class="btn btn-start">▶️ Démarrer</button>
            <button id="btn-stop" class="btn btn-stop" disabled>⏹️ Arrêter</button>
        </div>
        
        <div id="status" class="ready">Scanner prêt</div>
    </div>
    
    <div id="result-overlay">
        <div class="icon">✅</div>
        <div class="code" id="result-code"></div>
    </div>
    
    <script>
        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        let scanner = null;
        let isScanning = false;
        let lastCode = '';
        let isLibraryLoaded = false;
        
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const status = document.getElementById('status');
        const resultOverlay = document.getElementById('result-overlay');
        const resultCode = document.getElementById('result-code');
        
        // ==========================================
        // VÉRIFIER LE CHARGEMENT DE LA BIBLIOTHÈQUE
        // ==========================================
        function checkLibraryLoaded() {
            if (typeof Html5Qrcode !== 'undefined' && typeof Html5QrcodeScanner !== 'undefined') {
                isLibraryLoaded = true;
                console.log('✅ Bibliothèque Html5Qrcode chargée');
                updateStatus('Scanner prêt', 'ready');
            } else {
                console.log('⏳ Attente chargement bibliothèque...');
                setTimeout(checkLibraryLoaded, 100);
            }
        }
        
        // ==========================================
        // METTRE À JOUR LE STATUS
        // ==========================================
        function updateStatus(message, type = 'ready') {
            status.textContent = message;
            status.className = type;
        }
        
        // ==========================================
        // CALLBACK QUAND QR CODE EST SCANNÉ
        // ==========================================
        function onScanSuccess(decodedText, decodedResult) {
            // Éviter les scans multiples
            if (decodedText === lastCode) {
                return;
            }
            
            lastCode = decodedText;
            console.log('✅ QR scanné:', decodedText);
            console.log('📊 Détails:', decodedResult);
            
            // Afficher le résultat
            resultCode.textContent = decodedText;
            resultOverlay.classList.add('show');
            updateStatus('✅ Code détecté !', 'processing');
            
            // Sauvegarder dans localStorage
            try {
                localStorage.setItem('scannedQR', decodedText);
                localStorage.setItem('qrTimestamp', Date.now().toString());
                console.log('💾 Code sauvegardé dans localStorage');
            } catch (e) {
                console.warn('⚠️ Impossible de sauvegarder dans localStorage:', e);
            }
            
            // Envoyer à Flutter (si disponible)
            sendToFlutter(decodedText);
            
            // Pause temporaire du scanner
            if (scanner && isScanning) {
                try {
                    scanner.pause(true);
                    console.log('⏸️ Scanner en pause');
                } catch (e) {
                    console.warn('⚠️ Impossible de mettre en pause:', e);
                }
                
                // Reprendre après 2 secondes
                setTimeout(() => {
                    resultOverlay.classList.remove('show');
                    lastCode = '';
                    
                    if (scanner && isScanning) {
                        try {
                            scanner.resume();
                            updateStatus('🔍 Scan en cours<span class="loading-dots"></span>', 'active');
                            console.log('▶️ Scanner repris');
                        } catch (e) {
                            console.warn('⚠️ Impossible de reprendre:', e);
                        }
                    }
                }, 2000);
            }
        }
        
        // ==========================================
        // ENVOYER À FLUTTER
        // ==========================================
        function sendToFlutter(code) {
            console.log('📤 Tentative d\'envoi à Flutter:', code);
            
            // Méthode 1 : PostMessage (pour iframe/WebView)
            try {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage(
                        JSON.stringify({
                            type: 'QR_SCANNED',
                            code: code,
                            timestamp: Date.now()
                        }),
                        '*'
                    );
                    console.log('✅ PostMessage envoyé');
                }
            } catch (e) {
                console.log('ℹ️ PostMessage non disponible (normal sur GitHub Pages)');
            }
            
            // Méthode 2 : JavaScript Channel (InAppWebView Flutter)
            try {
                if (typeof flutter_inappwebview !== 'undefined' && flutter_inappwebview.callHandler) {
                    flutter_inappwebview.callHandler('qrScanned', code);
                    console.log('✅ JavaScript Channel envoyé');
                }
            } catch (e) {
                console.log('ℹ️ JavaScript Channel non disponible (normal sur GitHub Pages)');
            }
            
            // Méthode 3 : Custom Event
            try {
                window.dispatchEvent(new CustomEvent('qr-scanned', {
                    detail: { code: code, timestamp: Date.now() }
                }));
                console.log('✅ Custom Event dispatché');
            } catch (e) {
                console.log('⚠️ Custom Event échoué:', e);
            }
        }
        
        // ==========================================
        // CALLBACK EN CAS D'ERREUR DE SCAN
        // ==========================================
        function onScanFailure(error) {
            // Ne rien faire - erreurs normales pendant le scan continu
            // console.log('Scan en cours...', error);
        }
        
        // ==========================================
        // DÉMARRER LE SCAN
        // ==========================================
        async function startScan() {
            if (!isLibraryLoaded) {
                updateStatus('❌ Bibliothèque non chargée', 'error');
                alert('La bibliothèque de scan n\'est pas encore chargée. Veuillez patienter.');
                return;
            }
            
            try {
                updateStatus('🔄 Initialisation<span class="loading-dots"></span>', 'processing');
                
                // Créer l'instance du scanner si nécessaire
                if (!scanner) {
                    scanner = new Html5Qrcode("reader");
                    console.log('📱 Scanner créé');
                }
                
                // Obtenir les caméras disponibles
                const devices = await Html5Qrcode.getCameras();
                console.log('📷 Caméras trouvées:', devices.length);
                
                if (!devices || devices.length === 0) {
                    throw new Error('Aucune caméra trouvée sur cet appareil');
                }
                
                // Préférer la caméra arrière (index 1) si disponible
                const cameraId = devices.length > 1 ? devices[1].id : devices[0].id;
                console.log('📷 Caméra sélectionnée:', cameraId);
                
                // Démarrer le scan
                await scanner.start(
                    cameraId,
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 250 },
                        aspectRatio: 1.0
                    },
                    onScanSuccess,
                    onScanFailure
                );
                
                isScanning = true;
                btnStart.disabled = true;
                btnStop.disabled = false;
                updateStatus('🔍 Scan en cours<span class="loading-dots"></span>', 'active');
                
                console.log('✅ Scanner démarré avec succès');
                
            } catch (err) {
                console.error('❌ Erreur lors du démarrage:', err);
                
                let errorMessage = 'Erreur: ';
                
                if (err.name === 'NotAllowedError' || err.message.includes('permission')) {
                    errorMessage += 'Permission caméra refusée';
                } else if (err.message.includes('NotFoundError') || err.message.includes('caméra')) {
                    errorMessage += 'Aucune caméra trouvée';
                } else {
                    errorMessage += err.message;
                }
                
                updateStatus('❌ ' + errorMessage, 'error');
                
                alert(errorMessage + '\n\nAssurez-vous d\'autoriser l\'accès à la caméra.');
            }
        }
        
        // ==========================================
        // ARRÊTER LE SCAN
        // ==========================================
        async function stopScan() {
            try {
                if (scanner && isScanning) {
                    await scanner.stop();
                    
                    isScanning = false;
                    btnStart.disabled = false;
                    btnStop.disabled = true;
                    lastCode = '';
                    updateStatus('⏹️ Scan arrêté', 'ready');
                    
                    console.log('⏹️ Scanner arrêté');
                }
            } catch (err) {
                console.error('❌ Erreur lors de l\'arrêt:', err);
                updateStatus('❌ Erreur arrêt', 'error');
            }
        }
        
        // ==========================================
        // ÉVÉNEMENTS DES BOUTONS
        // ==========================================
        btnStart.addEventListener('click', () => {
            console.log('🖱️ Clic sur Démarrer');
            startScan();
        });
        
        btnStop.addEventListener('click', () => {
            console.log('🖱️ Clic sur Arrêter');
            stopScan();
        });
        
        // ==========================================
        // ÉCOUTER LES MESSAGES DE FLUTTER
        // ==========================================
        window.addEventListener('message', (event) => {
            try {
                const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                console.log('📨 Message reçu:', data);
                
                if (data.action === 'START_SCAN') {
                    startScan();
                } else if (data.action === 'STOP_SCAN') {
                    stopScan();
                }
            } catch (e) {
                // Ignorer les messages non-JSON
            }
        });
        
        // ==========================================
        // API PUBLIQUE
        // ==========================================
        window.getLastScannedCode = function() {
            try {
                return localStorage.getItem('scannedQR');
            } catch (e) {
                return null;
            }
        };
        
        window.clearLastCode = function() {
            try {
                localStorage.removeItem('scannedQR');
                localStorage.removeItem('qrTimestamp');
                console.log('🗑️ Code effacé');
            } catch (e) {
                console.warn('⚠️ Impossible d\'effacer:', e);
            }
        };
        
        window.autoStart = function() {
            console.log('🚀 Auto-démarrage dans 500ms');
            setTimeout(startScan, 500);
        };
        
        // ==========================================
        // INITIALISATION
        // ==========================================
        window.addEventListener('load', () => {
            console.log('📄 Page chargée');
            checkLibraryLoaded();
        });
        
        // Log de démarrage
        console.log('🎬 Script QR Scanner initialisé');
        console.log('📱 User Agent:', navigator.userAgent);
        console.log('🌐 URL:', window.location.href);
    </script>
</body>
</html>
